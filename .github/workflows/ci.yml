name: CI

on:
  push:
    branches: [main]
  pull_request:

# Network-free: typecheck, lint, and unit tests across the workspace.
# Never calls the KS Fit / Fitbit / Google APIs.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm --filter @stride/web lint
