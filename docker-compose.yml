services:
  ksfit:
    image: ksfit:latest
    container_name: ksfit
    restart: unless-stopped
    ports:
      # Bound to localhost — front this with Caddy on the host.
      - "127.0.0.1:3005:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      # Credentials live in web/.env.local (the same file Next.js loads in dev).
      # Path is relative to this compose file at the repo root.
      - web/.env.local
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Hits the local /api/health route (no KS Fit traffic, no lockout risk).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional reverse proxy for trusted local HTTPS on the LAN.
  # Enable with:  docker compose --profile proxy up -d
  # See docs/DEPLOY.md. Set the host LAN IP in the published ports below.
  caddy:
    image: caddy:2-alpine
    container_name: ksfit-caddy
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - ksfit
    ports:
      # Bind to the host's LAN IP only (replace 192.168.1.10 with yours).
      - "192.168.1.10:80:80"
      - "192.168.1.10:443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:
  caddy_config:
