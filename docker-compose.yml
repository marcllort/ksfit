services:
  ksfit:
    image: ksfit:latest
    container_name: ksfit
    restart: unless-stopped
    ports:
      # Bound to localhost — front this with Caddy on the host.
      - "127.0.0.1:3005:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.local
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
