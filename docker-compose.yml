services:
  stride:
    build:
      context: .
      dockerfile: Dockerfile
    image: stride:latest
    container_name: stride
    restart: unless-stopped
    ports:
      # Loopback only — front this with Caddy (host or the proxy profile below).
      # 3000 = web, 3001 = backend API. Caddy splits / and /api.
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      # KS Fit creds (+ optional FITBIT_* / GOOGLE_HEALTH_* / ANTHROPIC_API_KEY).
      - apps/web/.env.local
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_OPTIONS=--max-old-space-size=384
      - STRIDE_BACKEND_URL=http://127.0.0.1:3001
      - STRIDE_DB_PATH=/data/stride.db
      # 32-byte AES key for encrypting provider tokens at rest. REQUIRED in prod.
      # Generate once: openssl rand -hex 32  → put in web/.env.local as TOKEN_ENC_KEY.
      - TOKEN_ENC_KEY=${TOKEN_ENC_KEY:-}
    volumes:
      - stride_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Backend liveness — no upstream traffic, no KS Fit lockout risk.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional reverse proxy for trusted local HTTPS on the LAN.
  # Enable with:  docker compose --profile proxy up -d --build
  # See docs/DEPLOY.md. Set the host LAN IP in the published ports below.
  caddy:
    image: caddy:2-alpine
    container_name: stride-caddy
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - stride
    ports:
      # Bind to the host's LAN IP only (replace 192.168.1.10 with yours).
      - "192.168.1.10:80:80"
      - "192.168.1.10:443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  stride_data:
  caddy_data:
  caddy_config:
